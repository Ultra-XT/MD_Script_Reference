#CCM tooltips
 esbuff_ccm_button_plus_tip1: "§HAdd Opinion§!\n£click_left §YL Click§! to add §G10§! opinion with §Y[THIS.GetNameWithFlag]§!.\n\n£key_shift + £click_left §YShift L Click§! to add §G150§! opinion with §Y[THIS.GetNameWithFlag]§!.\n\n£key_alt + £click_left §YAlt L Click§! to remove opinion modifiers."
 esbuff_ccm_button_minus_tip1: "§HDecrease Opinion§!\n£click_left §YL Click§! to remove §R10§! opinion with §Y[THIS.GetNameWithFlag]§!.\n\n£key_shift + £click_left §YShift L Click§! to remove §R150§! opinion with §Y[THIS.GetNameWithFlag]§!.\n\n£key_alt + £click_left §YAlt L Click§! to remove opinion modifiers."

