 esbuff_ccm_button_minus_tip20: "§HRemove offsite Military factories§!\n£click_left §YL Click§! to remove §R5§! offsite military factories from §Y[THIS.GetNameWithFlag]§!.\n\n£key_shift + £click_left §YShift L Click§! to remove §R30§! offsite military factories from §Y[THIS.GetNameWithFlag]§!.\n\nNothing will happen, while on Pause. So don`t click this button a million times, before resuming the game."

 esbuff_ccm_button_plus_tip21: "§HAdd offsite Naval dockyards§!\n£click_left §YL Click§! to give §Y[THIS.GetNameWithFlag]§! §G5§! naval dockyards offsite.\n\n£key_shift + £click_left §YShift L Click§! to give §Y[THIS.GetNameWithFlag]§! §G30§! naval dockyards offsite.\n\nNothing will happen, while on Pause. So don`t click this button a million times, before resuming the game."
 esbuff_ccm_button_minus_tip21: "§HRemove offsite Naval dockyards§!\n£click_left §YL Click§! to remove §R5§! offsite naval dockyards from §Y[THIS.GetNameWithFlag]§!.\n\n£key_shift + £click_left §YShift L Click§! to remove §R30§! offsite naval dockyards from §Y[THIS.GetNameWithFlag]§!.\n\nNothing will happen, while on Pause. So don`t click this button a million times, before resuming the game."

 esbuff_ccm_button_plus_tip22: "§HAdd Influence§!\n£click_left §YL Click§! to add §G5%§! our influence in §Y[THIS.GetNameWithFlag]§!.\n\n£key_shift + £click_left §YShift L Click§! to add §G25%§! our influence in §Y[THIS.GetNameWithFlag]§!.\n\nIt is recommended to make a savegame before using this option, because sometimes it makes very strange things."
 esbuff_ccm_button_minus_tip22: "Why would you need such an option?"

 esbuff_ccm_button_plus_tip23: "§HIncrease Autonomy§!\n£click_left §YL Click§! to increase §Y[THIS.GetNameWithFlag]§! autonomy by §Y250§! points.\n\n£key_shift + £click_left §YShift L Click§! to increase §Y[THIS.GetNameWithFlag]§! autonomy by §Y1250§! points."
 esbuff_ccm_button_minus_tip23: "§HDecrease Autonomy§!\n£click_left §YL Click§! to decrease §Y[THIS.GetNameWithFlag]§! autonomy by §Y250§! points.\n\n£key_shift + £click_left §YShift L Click§! to decrease §Y[THIS.GetNameWithFlag]§! autonomy by §Y1250§! points."
 esbuff_ccm_autonomy_tip: "If the value is between §Y0§! and §Y1§!, then:\n§Y0§! means that the country`s autonomy can be lowered.\n§Y1§! means that the country`s autonomy can be raised.\n\n§Y-1§! means that this country is not your subject or that your country is not someone`s subject, in case you have selected your country."
 esbuff_ccm_button_tip24: "Force selected country to leave faction, it is currently in."
 esbuff_ccm_button_tip25: "Force selected country to disband faction, if selected country is the faction leader."

